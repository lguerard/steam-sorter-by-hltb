[workspace]
name = "steam-sorter-by-hltb"
version = "0.1.0"
description = "Sort your Steam library by HowLongToBeat playtime"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.11"
beautifulsoup4 = ">=4.12"
lxml = ">=5.0"
rich = ">=13.0"

[pypi-dependencies]
howlongtobeatpy = ">=1.0"

[tasks]
run = "python how_long_to_beat.py"
